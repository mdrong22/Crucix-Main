<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REDLINE — Trading Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030103;--panel:rgba(12,4,8,0.92);--glass:rgba(18,6,10,0.75);
  --text:#f0e0e4;--dim:rgba(255,140,160,0.45);
  --red:#ff2244;--red-dim:rgba(255,34,68,0.14);--red-glow:rgba(255,34,68,0.45);
  --red-border:rgba(255,34,68,0.22);--red-bright:rgba(255,34,68,0.5);
  --crucix-greener:#5ff9ce;--crucix-green:#64f0c8;--crucix-dim:#3b8a73;
  --orange:#ff6b35;
  --retro-orange:#C04E01;--retro-orange-dim:rgba(192,78,1,0.15);--retro-orange-border:rgba(192,78,1,0.5);
  --gold:#ffcc00;--green:#39ff6e;--green-dim:rgba(57,255,110,0.12);--green-glow:rgba(57,255,110,0.4);
  --mono:'IBM Plex Mono',monospace;--orb:'Orbitron',sans-serif;--raj:'Rajdhani',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--raj);overflow-x:hidden}
.atm-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,34,68,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,34,68,0.035) 1px,transparent 1px);
  background-size:48px 48px;mask-image:radial-gradient(ellipse at 50% 40%,black 10%,transparent 75%)}
.atm-radial{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% -10%,rgba(255,34,68,0.12),transparent 55%),
             radial-gradient(ellipse at 15% 85%,rgba(255,107,53,0.07),transparent 40%),
             radial-gradient(ellipse at 85% 70%,rgba(180,0,60,0.06),transparent 40%)}
.atm-scanline{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.atm-scanline::after{content:'';position:absolute;left:0;width:100%;height:3px;
  background:linear-gradient(90deg,transparent 0%,rgba(255,34,68,0.08) 30%,rgba(255,34,68,0.14) 50%,rgba(255,34,68,0.08) 70%,transparent 100%);
  animation:scan 5s linear infinite}
@keyframes scan{0%{top:-3px}100%{top:100%}}
.atm-crt{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);opacity:0.7}
.atm-vignette{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 50%,transparent 50%,rgba(0,0,0,0.55) 100%)}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;height:48px;border-bottom:1px solid var(--red-border);
  background:rgba(8,2,4,0.96);backdrop-filter:blur(24px);flex-wrap:wrap;gap:8px}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--red),transparent);opacity:0.4}
.tb-left{display:flex;align-items:center;gap:12px}
.back-btn{display:flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--crucix-greener);
  background:var(--crucix-dim);color:var(--crucix-green);font-family:var(--mono);font-size:10px;
  letter-spacing:0.08em;text-decoration:none;text-transform:uppercase;transition:all 0.2s}
.back-btn:hover{border-color:var(--crucix-greener);color:var(--text);background:var(--crucix-green)}
.brand-sep{color:rgba(255,34,68,0.3);font-family:var(--mono);font-size:14px;margin:0 2px}
.brand-rl{font-family:var(--orb);font-size:14px;font-weight:800;letter-spacing:0.18em;color:var(--red);
  text-shadow:0 0 20px var(--red-glow),0 0 40px rgba(255,34,68,0.2)}
.tb-center{display:flex;align-items:center;gap:6px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green-glow);animation:blink 2s ease-in-out infinite}
.status-dot.loading{background:var(--gold);box-shadow:0 0 8px rgba(255,204,0,0.4)}
.status-dot.error{background:var(--red);box-shadow:0 0 8px var(--red-glow);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.status-txt{font-family:var(--mono);font-size:10px;color:rgba(57,255,110,0.7);letter-spacing:0.08em;text-transform:uppercase}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-pill{font-family:var(--mono);font-size:10px;color:var(--dim);padding:4px 9px;border:1px solid var(--red-border);letter-spacing:0.06em}
.tb-pill span{color:var(--text);font-weight:500}
.tb-clock{font-family:var(--orb);font-size:11px;font-weight:600;color:rgba(255,80,100,0.8);
  letter-spacing:0.1em;padding:4px 10px;border:1px solid var(--red-border);background:var(--red-dim)}
.refresh-btn{padding:4px 10px;border:1px solid var(--red-border);background:none;color:rgba(255,100,120,0.5);
  font-family:var(--mono);font-size:9px;letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;text-transform:uppercase}
.refresh-btn:hover{border-color:rgba(255,34,68,0.5);color:var(--red)}
.refresh-btn:disabled{opacity:0.3;cursor:not-allowed}

/* ── TICKER ── */
.alert-bar{display:flex;align-items:center;height:26px;border-bottom:1px solid rgba(255,34,68,0.12);
  background:rgba(6,1,3,0.95);overflow:hidden;position:relative;z-index:10}
.alert-label{flex-shrink:0;padding:0 14px;height:100%;display:flex;align-items:center;
  background:var(--red);font-family:var(--orb);font-size:7px;font-weight:700;letter-spacing:0.16em;color:#fff}
.alert-scroll{flex:1;overflow:hidden}
.alert-track{display:flex;align-items:center;height:26px;white-space:nowrap;animation:tickerMove 40s linear infinite}
.alert-track:hover{animation-play-state:paused}
@keyframes tickerMove{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.al-item{font-family:var(--mono);font-size:9px;padding:0 16px;display:inline-flex;align-items:center;gap:5px;border-right:1px solid rgba(255,34,68,0.1)}
.al-sym{color:#fff;font-weight:600;letter-spacing:0.06em}
.al-val.up{color:var(--green)}.al-val.dn{color:var(--retro-orange)}.al-val.flat{color:rgba(255,200,215,0.5)}

/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,rgba(255,34,68,0.05) 25%,rgba(255,34,68,0.12) 50%,rgba(255,34,68,0.05) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:2px;display:inline-block}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── ERROR ── */
.error-banner{display:none;padding:10px 16px;background:rgba(255,34,68,0.1);border:1px solid rgba(255,34,68,0.3);
  font-family:var(--mono);font-size:10px;color:var(--red);letter-spacing:0.05em;margin:8px 12px}
.error-banner.show{display:block}

/* ── LAYOUT ── */
#app{position:relative;z-index:2;padding:10px 12px;min-height:calc(100vh - 74px);animation:pageIn 0.4s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.layout{display:grid;grid-template-columns:1fr 330px;gap:10px;align-items:start}
.col-main{display:flex;flex-direction:column;gap:10px}
.col-side{display:flex;flex-direction:column;gap:10px}

/* ── PANEL ── */
.panel{border:1px solid var(--red-border);background:var(--panel);backdrop-filter:blur(18px);padding:14px;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--red-bright),transparent);opacity:0.5;pointer-events:none}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.panel-title{font-family:var(--orb);font-size:8px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,80,100,0.6)}
.panel-badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border:1px solid var(--red-border);color:var(--red);letter-spacing:0.06em}
.panel-badge.live{color:var(--green);border-color:rgba(57,255,110,0.3);background:var(--green-dim)}
.cm{position:absolute;width:10px;height:10px;border-color:rgba(255,34,68,0.35)}
.cm.tl{top:3px;left:3px;border-top:1px solid;border-left:1px solid}
.cm.tr{top:3px;right:3px;border-top:1px solid;border-right:1px solid}
.cm.bl{bottom:3px;left:3px;border-bottom:1px solid;border-left:1px solid}
.cm.br{bottom:3px;right:3px;border-bottom:1px solid;border-right:1px solid}

/* ── PORTFOLIO HEADER ── */
.pf-header{padding:20px 22px 16px;border:1px solid var(--red-border);background:var(--panel);
  backdrop-filter:blur(20px);position:relative;overflow:hidden}
.pf-header::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--red),transparent)}
.pf-watermark{position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-family:var(--orb);font-size:72px;font-weight:900;color:rgba(255,34,68,0.03);
  letter-spacing:0.06em;pointer-events:none;white-space:nowrap;line-height:1}
.pf-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.pf-eyebrow{font-family:var(--orb);font-size:8px;letter-spacing:0.18em;color:rgba(255,80,100,0.5);margin-bottom:8px}
.pf-value{font-family:var(--orb);font-size:44px;font-weight:700;color:#fff;line-height:1;
  letter-spacing:0.01em;text-shadow:0 0 40px rgba(255,34,68,0.2)}
.pf-delta{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.pf-chg{font-family:var(--mono);font-size:13px;font-weight:700;padding:5px 12px;border:1px solid}
.pf-chg.up{color:var(--green);border-color:rgba(57,255,110,0.4);background:rgba(57,255,110,0.07);text-shadow:0 0 8px var(--green-glow)}
.pf-chg.dn{color:var(--retro-orange);border-color:var(--retro-orange-border);background:var(--retro-orange-dim)}
.pf-period-lbl{font-family:var(--mono);font-size:9px;color:rgba(255,100,120,0.4);letter-spacing:0.1em;text-transform:uppercase}
.pf-stats{display:flex;gap:8px;flex-wrap:wrap}
.pf-stat{padding:10px 14px;border:1px solid var(--red-border);background:rgba(255,34,68,0.04);min-width:90px}
.pf-stat-lbl{font-family:var(--orb);font-size:7px;letter-spacing:0.14em;color:rgba(255,80,100,0.45);margin-bottom:5px;text-transform:uppercase}
.pf-stat-val{font-family:var(--orb);font-size:15px;font-weight:600}
.pf-stat-val.up{color:var(--green)}.pf-stat-val.dn{color:var(--retro-orange)}.pf-stat-val.neu{color:rgba(255,210,220,0.85)}
.chart-wrap{position:relative;height:190px;margin-top:12px}
#mainChart{width:100%;height:100%}
.last-updated{font-family:var(--mono);font-size:8px;color:rgba(255,80,100,0.25);letter-spacing:0.05em;text-align:right;padding:4px 0 0}

/* ── MARKET OVERVIEW ── */
.mkt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
.mkt-card{padding:10px 12px;border:1px solid var(--red-border);background:rgba(14,4,8,0.8)}
.mkt-sym{font-family:var(--orb);font-size:11px;font-weight:700;letter-spacing:0.07em;color:#fff}
.mkt-name{font-family:var(--mono);font-size:7px;color:rgba(255,130,150,0.4);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mkt-price{font-family:var(--orb);font-size:15px;font-weight:600;color:#fff;margin-top:5px}
.mkt-chg{font-family:var(--mono);font-size:9px;margin-top:2px}
.mkt-chg.up{color:var(--green)}.mkt-chg.dn{color:var(--retro-orange)}.mkt-chg.flat{color:rgba(255,200,215,0.4)}

/* ── POSITIONS ── */
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px}
.pos-card{padding:12px 13px;border:1px solid var(--red-border);background:rgba(14,4,8,0.8);
  position:relative;overflow:hidden;cursor:pointer;transition:all 0.2s}
.pos-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,34,68,0.18),transparent);pointer-events:none}
.pos-card:hover{transform:translateY(-2px);border-color:rgba(255,34,68,0.45);box-shadow:0 6px 24px rgba(255,34,68,0.12)}
.pos-card.is-up:hover{border-color:rgba(57,255,110,0.35);box-shadow:0 6px 24px rgba(57,255,110,0.08)}
.pos-card.is-dn:hover{border-color:var(--retro-orange-border);box-shadow:0 6px 24px rgba(192,78,1,0.12)}
.pos-ghost{position:absolute;right:6px;top:50%;transform:translateY(-50%);
  font-family:var(--orb);font-size:28px;font-weight:900;opacity:0.055;letter-spacing:0.04em;pointer-events:none}
.pos-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.pos-ticker{font-family:var(--orb);font-size:14px;font-weight:700;letter-spacing:0.07em;color:#fff}
.pos-name{font-family:var(--mono);font-size:8px;color:rgba(255,130,150,0.45);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.pos-spark-svg{width:54px;height:22px;flex-shrink:0}
.pos-row2{display:flex;align-items:baseline;gap:6px;margin-top:7px}
.pos-price{font-family:var(--orb);font-size:17px;font-weight:600;color:#fff}
.pos-chg-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 5px;border:1px solid}
.pos-chg-badge.up{color:var(--green);border-color:rgba(57,255,110,0.3);background:rgba(57,255,110,0.06)}
.pos-chg-badge.dn{color:var(--retro-orange);border-color:var(--retro-orange-border);background:var(--retro-orange-dim)}
.pos-row3{display:flex;justify-content:space-between;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,34,68,0.07)}
.pos-meta-lbl{font-family:var(--mono);font-size:7px;color:rgba(255,100,120,0.35);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px}
.pos-meta-val{font-family:var(--orb);font-size:10px;font-weight:500;color:rgba(255,210,220,0.8)}
.pos-pnl-val{font-family:var(--orb);font-size:10px;font-weight:600}
.pos-pnl-val.pos{color:var(--green)}.pos-pnl-val.neg{color:var(--retro-orange)}

/* ── TRANSACTIONS ── */
.tx-scroll{max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;
  scrollbar-width:thin;scrollbar-color:rgba(255,34,68,0.2) transparent}
.tx-row{padding:9px 11px;border:1px solid rgba(255,34,68,0.07);border-left:2px solid;
  background:rgba(12,4,6,0.7);display:flex;align-items:flex-start;gap:9px;transition:background 0.15s}
.tx-row:hover{background:rgba(20,6,10,0.9)}
.tx-row.buy{border-left-color:var(--green)}.tx-row.sell{border-left-color:var(--retro-orange)}.tx-row.other{border-left-color:var(--gold)}
.tx-icon{width:26px;height:26px;border:1px solid;display:flex;align-items:center;justify-content:center;
  font-family:var(--orb);font-size:6px;font-weight:700;letter-spacing:0.07em;flex-shrink:0;margin-top:1px}
.tx-icon.buy{color:var(--green);border-color:rgba(57,255,110,0.3);background:rgba(57,255,110,0.06)}
.tx-icon.sell{color:var(--retro-orange);border-color:var(--retro-orange-border);background:var(--retro-orange-dim)}
.tx-icon.other{color:var(--gold);border-color:rgba(255,204,0,0.3);background:rgba(255,204,0,0.06)}
.tx-body{flex:1;min-width:0}
.tx-line1{display:flex;justify-content:space-between;align-items:flex-start;gap:4px}
.tx-ticker{font-family:var(--orb);font-size:11px;font-weight:700;letter-spacing:0.06em;color:#fff}
.tx-amt{font-family:var(--orb);font-size:11px;font-weight:600}
.tx-amt.buy{color:var(--retro-orange)}.tx-amt.sell{color:var(--green)}.tx-amt.other{color:var(--gold)}
.tx-detail{font-family:var(--mono);font-size:8px;color:rgba(255,130,150,0.4);margin-top:2px}
.tx-time{font-family:var(--mono);font-size:7px;color:rgba(255,80,100,0.25);margin-top:2px;letter-spacing:0.04em}
.tx-status{font-family:var(--mono);font-size:7px;margin-top:1px;letter-spacing:0.04em}
.tx-status.filled{color:rgba(57,255,110,0.5)}.tx-status.partial{color:rgba(255,204,0,0.5)}.tx-status.pending{color:rgba(255,130,150,0.3)}

.empty-state{padding:28px;text-align:center;font-family:var(--mono);font-size:10px;color:rgba(255,100,120,0.3);letter-spacing:0.08em}

@media(max-width:1100px){.layout{grid-template-columns:1fr}}
@media(max-width:700px){.pos-grid{grid-template-columns:1fr 1fr}.mkt-grid{grid-template-columns:repeat(2,1fr)}.pf-value{font-size:32px}}
</style>
</head>
<body>
<div class="atm-grid"></div><div class="atm-radial"></div><div class="atm-scanline"></div>
<div class="atm-crt"></div><div class="atm-vignette"></div>

<div class="topbar">
  <div class="tb-left">
    <a class="back-btn" href="jarvis.html">&#8592; CRUCIX</a>
    <span class="brand-sep">//</span>
    <span class="brand-rl">PROJECT REDLINE</span>
  </div>
  <div class="tb-center">
    <div class="status-dot loading" id="statusDot"></div>
    <div class="status-txt" id="statusTxt">CONNECTING...</div>
  </div>
  <div class="tb-right">
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll(true)" disabled>↺ REFRESH</button>
    <div class="tb-pill">BUYING PWR <span id="buyingPwr">—</span></div>
    <div class="tb-clock" id="clock">--:--:--</div>
  </div>
</div>

<div class="alert-bar">
  <div class="alert-label">⬛ LIVE</div>
  <div class="alert-scroll"><div class="alert-track" id="alertTrack">
    <span class="al-item"><span class="al-sym">LOADING</span><span class="al-val flat">market data...</span></span>
  </div></div>
</div>

<div class="error-banner" id="errorBanner"></div>

<div id="app">
  <div class="layout">
    <div class="col-main">

      <div class="pf-header">
        <div class="cm tl"></div><div class="cm tr"></div><div class="cm bl"></div><div class="cm br"></div>
        <div class="pf-watermark">PROJECT REDLINE</div>
        <div class="pf-top">
          <div>
            <div class="pf-eyebrow">TOTAL PORTFOLIO VALUE</div>
            <div class="pf-value" id="pfValue"><span class="skel" style="width:220px;height:44px"></span></div>
            <div class="pf-delta">
              <div class="pf-chg" id="pfPnl" style="opacity:0.3">— P&L</div>
              <div class="pf-period-lbl">OPEN P&L</div>
            </div>
          </div>
          <div class="pf-stats" id="pfStats">
            <div class="pf-stat"><div class="pf-stat-lbl">POSITIONS</div><div class="pf-stat-val neu"><span class="skel" style="width:40px;height:20px"></span></div></div>
            <div class="pf-stat"><div class="pf-stat-lbl">TOTAL P&L</div><div class="pf-stat-val"><span class="skel" style="width:60px;height:20px"></span></div></div>
            <div class="pf-stat"><div class="pf-stat-lbl">WINNERS</div><div class="pf-stat-val"><span class="skel" style="width:40px;height:20px"></span></div></div>
            <div class="pf-stat"><div class="pf-stat-lbl">LOSERS</div><div class="pf-stat-val"><span class="skel" style="width:40px;height:20px"></span></div></div>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
        <div class="last-updated" id="lastUpdated"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">◈ MARKET OVERVIEW // LIVE QUOTES</div>
          <div class="panel-badge live">● LIVE</div>
        </div>
        <div class="mkt-grid" id="mktGrid"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">◈ OPEN POSITIONS // HOLDINGS</div>
          <div class="panel-badge" id="posCount">— POSITIONS</div>
        </div>
        <div class="pos-grid" id="posGrid"></div>
      </div>

    </div>
    <div class="col-side">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">◈ ORDERS // LAST 24H</div>
          <div class="panel-badge" id="txCount">— ORDERS</div>
        </div>
        <div class="tx-scroll" id="txScroll"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CLOCK
function tick(){const n=new Date();document.getElementById('clock').textContent=n.toUTCString().slice(17,25)+' UTC';}
tick();setInterval(tick,1000);

// ── HELPERS
const fmt=(v,d=2)=>v==null?'—':Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtK=v=>v>=1000?'$'+(v/1000).toFixed(0)+'k':'$'+v.toFixed(0);
const fmtPrice=v=>{if(v==null)return'—';const n=Number(v);return n>=1000?'$'+fmt(n,0):'$'+fmt(n,2)};

// ── Coerce strings returned from the cleaned API back to numbers safely
const num = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };

// ── SKELETONS (injected by JS — never template literals in raw HTML)
const SKEL_MKT = Array(8).fill(0).map(()=>`<div class="mkt-card"><span class="skel" style="width:60px;height:11px;margin-bottom:4px"></span><span class="skel" style="width:90px;height:8px;display:block;margin-bottom:8px"></span><span class="skel" style="width:70px;height:15px;display:block"></span></div>`).join('');
const SKEL_POS = Array(6).fill(0).map(()=>`<div class="pos-card"><span class="skel" style="width:60px;height:14px;margin-bottom:6px"></span><span class="skel" style="width:100px;height:8px;display:block;margin-bottom:10px"></span><span class="skel" style="width:80px;height:17px;display:block"></span></div>`).join('');
const SKEL_TX  = Array(4).fill(0).map(()=>`<div class="tx-row other"><div class="tx-icon other">···</div><div class="tx-body"><span class="skel" style="width:120px;height:11px;margin-bottom:4px"></span><span class="skel" style="width:80px;height:8px;display:block"></span></div></div>`).join('');
document.getElementById('mktGrid').innerHTML  = SKEL_MKT;
document.getElementById('posGrid').innerHTML  = SKEL_POS;
document.getElementById('txScroll').innerHTML = SKEL_TX;

function setStatus(state,txt){
  const dot=document.getElementById('statusDot'),lbl=document.getElementById('statusTxt');
  dot.className='status-dot '+state; lbl.textContent=txt;
  lbl.style.color=state==='error'?'rgba(255,34,68,0.7)':state==='loading'?'rgba(255,204,0,0.7)':'rgba(57,255,110,0.7)';
}
function showError(msg){
  const b=document.getElementById('errorBanner');
  b.textContent='⚠ '+msg; b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),8000);
}
function sparkPath(data,W,H){
  if(!data||data.length<2)return'';
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  return 'M'+data.map((v,i)=>`${(i/(data.length-1))*W},${H-((v-mn)/rng)*(H*0.82)-H*0.09}`).join(' L');
}

// ── TICKER
function buildTicker(quotes){
  const track=document.getElementById('alertTrack');
  if(!quotes||!Object.keys(quotes).length)return;
  const items=Object.values(quotes).filter(q=>q&&!q.error&&q.price);
  if(!items.length)return;
  track.innerHTML=[...items,...items].map(q=>{
    const up=q.changePct>=0,cls=Math.abs(q.changePct)<0.01?'flat':up?'up':'dn';
    return `<span class="al-item"><span class="al-sym">${q.symbol}</span><span class="al-val ${cls}">${up?'+':''}${fmt(q.changePct,2)}%</span></span>`;
  }).join('');
}

// ── MARKET OVERVIEW
function buildMarket(quotes){
  const grid=document.getElementById('mktGrid');
  if(!quotes){grid.innerHTML='<div class="empty-state">NO MARKET DATA</div>';return;}
  const items=Object.values(quotes).filter(q=>q&&!q.error&&q.price);
  if(!items.length){grid.innerHTML='<div class="empty-state">NO QUOTES AVAILABLE</div>';return;}
  grid.innerHTML=items.map(q=>{
    const up=q.changePct>=0,cls=Math.abs(q.changePct)<0.01?'flat':up?'up':'dn';
    return `<div class="mkt-card">
      <div class="mkt-sym">${q.symbol}</div>
      <div class="mkt-name">${q.name||''}</div>
      <div class="mkt-price">${fmtPrice(q.price)}</div>
      <div class="mkt-chg ${cls}">${up?'▲ +':'▼ '}${fmt(Math.abs(q.changePct),2)}%</div>
    </div>`;
  }).join('');
}

// ── PORTFOLIO HEADER
// NEW API shape: { symbol, units, price, avg_cost, pnl_pct, value }
// All values come as strings — coerce with num()
function buildPortfolioHeader(positions,totalValue){
  // pnl_pct is a percentage — use value field for dollar-based P&L calc
  const totalPnl  = positions.reduce((s,p)=>s+(num(p.value)-num(p.avg_cost)*num(p.units)),0);
  const winners   = positions.filter(p=>num(p.pnl_pct)>0).length;
  const losers    = positions.filter(p=>num(p.pnl_pct)<0).length;
  const pnlUp     = totalPnl>=0;
  const displayVal= totalValue!=null?totalValue:positions.reduce((s,p)=>s+num(p.value),0);

  document.getElementById('pfValue').innerHTML=`$${fmt(displayVal,2)}`;
  const pfPnl=document.getElementById('pfPnl');
  pfPnl.className='pf-chg '+(pnlUp?'up':'dn');
  pfPnl.style.opacity='1';
  pfPnl.innerHTML=`${pnlUp?'▲ +':'▼ '}$${fmt(Math.abs(totalPnl),2)} OPEN P&L`;

  document.getElementById('pfStats').innerHTML=[
    {lbl:'POSITIONS',val:positions.length,cls:'neu'},
    {lbl:'TOTAL P&L',val:(pnlUp?'+':'')+' $'+fmt(Math.abs(totalPnl),2),cls:pnlUp?'up':'dn'},
    {lbl:'WINNERS',val:winners,cls:'up'},
    {lbl:'LOSERS',val:losers,cls:'dn'},
  ].map(s=>`<div class="pf-stat"><div class="pf-stat-lbl">${s.lbl}</div><div class="pf-stat-val ${s.cls}">${s.val}</div></div>`).join('');
}

// ── POSITIONS
// NEW API shape: { symbol, units, price, avg_cost, pnl_pct, value }
function buildPositions(positions,quotes){
  const grid=document.getElementById('posGrid');
  if(!positions||!positions.length){
    grid.innerHTML='<div class="empty-state">NO POSITIONS FOUND</div>';
    document.getElementById('posCount').textContent='0 POSITIONS';
    return;
  }

  const quoteLookup={};
  if(quotes) Object.values(quotes).forEach(q=>{if(q&&q.symbol)quoteLookup[q.symbol]=q;});

  grid.innerHTML=positions.map(p=>{
    // ── Field mapping for cleaned API shape ──────────────────────────────────
    // p.symbol  → the ticker string (e.g. "RTX", "AAPL")
    // p.price   → current price (string, coerce with num())
    // p.units   → number of shares (string)
    // p.avg_cost→ average cost basis per share (string)
    // p.pnl_pct → P&L as a percentage (string, e.g. "3.42" = 3.42%)
    // p.value   → current market value of position (string)
    const ticker  = typeof p.symbol === 'string' ? p.symbol : (p.symbol?.symbol || p.symbol?.raw_symbol || '???');
    const price   = num(p.price);
    const units   = num(p.units);
    const avgCost = num(p.avg_cost);
    const pnlPct  = num(p.pnl_pct);
    const mktVal  = num(p.value) || price * units;
    const pnlDollar= mktVal - (avgCost * units);
    const pnlUp   = pnlPct >= 0;

    // Change % — prefer live yFinance quote, fall back to pnl_pct from API
    const q         = quoteLookup[ticker];
    const changePct = q ? q.changePct : pnlPct;
    const up        = changePct >= 0;

    // Sparkline — prefer yFinance 5d history, else simulate cost→price path
    let sparkData;
    if(q&&q.history&&q.history.length>=2){
      sparkData=q.history.map(h=>h.close);
    } else {
      sparkData=Array.from({length:8},(_,i)=>avgCost+((price-avgCost)*i/7)+(Math.random()-0.5)*price*0.005);
    }
    const sp    =sparkPath(sparkData,54,22);
    const stroke=up?'#39ff6e':'#C04E01';

    return `<div class="pos-card ${up?'is-up':'is-dn'}">
      <div class="pos-ghost">${ticker}</div>
      <div class="pos-row1">
        <div>
          <div class="pos-ticker">${ticker}</div>
          <div class="pos-name" title="${ticker}">${ticker}</div>
        </div>
        ${sp?`<svg class="pos-spark-svg" viewBox="0 0 54 22" preserveAspectRatio="none">
          <path d="${sp}" fill="none" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
        </svg>`:'<div style="width:54px"></div>'}
      </div>
      <div class="pos-row2">
        <div class="pos-price">${fmtPrice(price)}</div>
        <div class="pos-chg-badge ${up?'up':'dn'}">${up?'▲':'▼'} ${fmt(Math.abs(changePct),2)}%</div>
      </div>
      <div class="pos-row3">
        <div><div class="pos-meta-lbl">UNITS</div><div class="pos-meta-val">${units<1?fmt(units,4):fmt(units,2)}</div></div>
        <div><div class="pos-meta-lbl">MKT VAL</div><div class="pos-meta-val">$${fmt(mktVal,0)}</div></div>
        <div><div class="pos-meta-lbl">P&L</div><div class="pos-pnl-val ${pnlUp?'pos':'neg'}">${pnlUp?'+':'-'}$${fmt(Math.abs(pnlDollar),2)}</div></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('posCount').textContent=positions.length+' POSITIONS';
}

// ── ORDERS
// NEW API shape: { symbol, action, status, type }
function buildOrders(ordersData){
  const scroll=document.getElementById('txScroll');
  const orders=ordersData?.orders||(Array.isArray(ordersData)?ordersData:[]);

  if(!orders.length){
    scroll.innerHTML='<div class="empty-state">NO ORDERS IN LAST 24H</div>';
    document.getElementById('txCount').textContent='0 ORDERS';
    return;
  }

  scroll.innerHTML=orders.map(o=>{
    // NEW shape: { symbol, action, status, type }
    // OLD shape (raw SnapTrade): { universal_symbol, action, status, order_type, ... }
    // Handle both for resilience
    const action   =(o.action||'ORDER').toLowerCase();
    const isBuy    =action==='buy', isSell=action==='sell';
    const typeClass=isBuy?'buy':isSell?'sell':'other';

    // Ticker: new shape has o.symbol as a string directly
    const ticker = typeof o.symbol === 'string'
      ? o.symbol
      : (o.universal_symbol?.symbol || o.quote_universal_symbol?.symbol || '???');

    // For the cleaned API, we don't have filled_quantity / execution_price
    // so we show what we have: action, type, status
    const orderType= o.type || o.order_type || 'Order';
    const status   = o.status || '';
    let statusClass='pending', statusLabel=status||'PENDING';
    const sl=status.toLowerCase();
    if(sl==='executed'||sl==='filled'||sl==='complete'){statusClass='filled';statusLabel='FILLED';}
    else if(sl==='partial'||sl==='partially_filled'){statusClass='partial';statusLabel='PARTIAL';}
    else if(sl==='pending'||sl==='open'){statusClass='pending';statusLabel='PENDING';}
    else if(sl==='cancelled'||sl==='rejected'){statusClass='pending';statusLabel=status.toUpperCase();}

    // For cleaned shape we may not have price/qty — show dashes gracefully
    const filledQty =parseFloat(o.units)||0;
    const execPrice =o.price;
    const limitPrice=o.limit_price;
    const total     =filledQty*(execPrice||limitPrice||0);
    const pfx       =isBuy?'-$':'+$';
    const timeStr   =o.time ||'';
    const timeFmt   =timeStr?new Date(timeStr).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
    const detail    =execPrice?`${filledQty} units @ $${fmt(execPrice,2)}`:limitPrice?`Limit $${fmt(limitPrice,2)} · ${orderType}`:orderType;

    return `<div class="tx-row ${typeClass}">
      <div class="tx-icon ${typeClass}">${(o.action||'ORD').toUpperCase().slice(0,4)}</div>
      <div class="tx-body">
        <div class="tx-line1">
          <span class="tx-ticker">${ticker}</span>
          <span class="tx-amt ${typeClass}">${total>0?pfx+fmt(total,2):'—'}</span>
        </div>
        <div class="tx-detail">${detail}</div>
        <div class="tx-time">${timeFmt}</div>
        <div class="tx-status ${statusClass}">${statusLabel}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('txCount').textContent=orders.length+' ORDERS';
}

// ── CHART
function genChartData(positions){
  const pts=40;
  // Use new API fields: avg_cost * units = cost basis, value = current mkt val
  const totalCost=positions.reduce((s,p)=>s+num(p.avg_cost)*num(p.units),0);
  const totalNow =positions.reduce((s,p)=>s+num(p.value||0)||num(p.price)*num(p.units),0);
  const data=[];let v=totalCost||1;
  const step=(totalNow-totalCost)/(pts*0.6);
  for(let i=0;i<pts;i++){v+=step+(Math.random()-0.48)*Math.abs(step||1)*2;data.push(v);}
  data[data.length-1]=totalNow||v;
  return data;
}

function drawChart(positions){
  const canvas=document.getElementById('mainChart');
  if(!canvas||!positions||!positions.length)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.parentElement.offsetWidth,H=190;
  canvas.width=W;canvas.height=H;
  const data=genChartData(positions);
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const isUp=data[data.length-1]>=data[0];
  const lc=isUp?'#39ff6e':'#C04E01',gc=isUp?'rgba(57,255,110,.7)':'rgba(192,78,1,.7)',ft=isUp?'rgba(57,255,110,.10)':'rgba(192,78,1,.10)';
  const px=i=>(i/(data.length-1))*W,py=v=>H-0.08*H-((v-mn)/rng)*(H*0.82);
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,34,68,.055)';ctx.lineWidth=1;
  for(let g=1;g<5;g++){
    const y=py(mn+rng*g/4);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
    ctx.fillStyle='rgba(255,80,100,.3)';ctx.font="500 8px 'IBM Plex Mono'";ctx.textAlign='left';ctx.fillText(fmtK(mn+rng*g/4),4,y-3);
  }
  const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,ft);grad.addColorStop(0.7,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.moveTo(px(0),py(data[0]));data.forEach((v,i)=>ctx.lineTo(px(i),py(v)));
  ctx.lineTo(px(data.length-1),H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.save();ctx.shadowColor=gc;ctx.shadowBlur=10;ctx.strokeStyle=lc;ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(px(0),py(data[0]));data.forEach((v,i)=>ctx.lineTo(px(i),py(v)));ctx.stroke();ctx.restore();
  const curY=py(data[data.length-1]);
  ctx.strokeStyle='rgba(192,78,1,.22)';ctx.lineWidth=1;ctx.setLineDash([3,5]);ctx.beginPath();ctx.moveTo(0,curY);ctx.lineTo(W,curY);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(192,78,1,.65)';ctx.font="600 9px 'IBM Plex Mono'";ctx.textAlign='right';ctx.fillText('$'+fmt(data[data.length-1],0),W-4,curY-4);
  ctx.save();ctx.shadowColor=lc;ctx.shadowBlur=14;ctx.fillStyle=lc;ctx.beginPath();ctx.arc(px(data.length-1),curY,4,0,Math.PI*2);ctx.fill();ctx.restore();
}
window.addEventListener('resize',()=>{if(window._lastPositions)drawChart(window._lastPositions);});

// ── LOAD
async function loadAll(manual=false){
  const refreshBtn=document.getElementById('refreshBtn');
  if(refreshBtn)refreshBtn.disabled=true;
  setStatus('loading',manual?'REFRESHING...':'CONNECTING...');

  try{
    const res=await fetch('/api/redline');
    if(!res.ok)throw new Error(`/api/redline returned ${res.status}`);
    const d=await res.json();

    // Portfolio — new API returns cleaned array directly
    let positions=[];
    const rp=d.currentPortfolio;
    if(Array.isArray(rp))positions=rp;
    else if(typeof rp==='string'){try{const p=JSON.parse(rp);positions=Array.isArray(p)?p:[];}catch{positions=[];}}
    else if(rp&&typeof rp==='object')positions=[rp];

    // Orders — server sends { orders: [...] }
    let ordersData={orders:[]};
    const ro=d.accountOrders24h;
    if(ro){
      if(typeof ro==='string'){try{const p=JSON.parse(ro);ordersData=Array.isArray(p.orders)?p:{orders:Array.isArray(p)?p:[]};}catch{ordersData={orders:[]};}}
      else ordersData=Array.isArray(ro.orders)?ro:{orders:Array.isArray(ro)?ro:[]};
    }

    const quotes    =d.yfinance?.quotes??null;
    const bp        =d.buyingPower??0;
    const totalValue=d.accountTotalValue??null;

    const bpEl=document.getElementById('buyingPwr');
    if(bpEl)bpEl.textContent=bp!=null?'$'+fmt(bp,2):'—';

    buildTicker(quotes);
    buildMarket(quotes);
    buildPortfolioHeader(positions,totalValue);
    buildPositions(positions,quotes);
    buildOrders(ordersData);
    drawChart(positions);
    window._lastPositions=positions;

    const lu=document.getElementById('lastUpdated');
    if(lu)lu.textContent='LAST UPDATED: '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

    setStatus('live','MARKET OPEN · LIVE DATA');
    const eb=document.getElementById('errorBanner');
    if(eb)eb.classList.remove('show');

  }catch(err){
    setStatus('error','CONNECTION ERROR');
    showError(err.message);
    console.error('[REDLINE] Load failed:',err);
  }finally{
    if(refreshBtn)refreshBtn.disabled=false;
  }
}

loadAll();
setInterval(()=>loadAll(),5*60*1000);
</script>
</body>
</html>
